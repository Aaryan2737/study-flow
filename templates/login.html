<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>StudyFlow — Get Started</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:      #080B14;
    --surface: #0E1220;
    --card:    #131828;
    --border:  #1E2640;
    --accent:  #5B8CFF;
    --mint:    #00E5BE;
    --warn:    #FF5F6D;
    --gold:    #FFB830;
    --text:    #E4EAF6;
    --muted:   #6B7A99;
    --font-head: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .bg-grid {
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(91,140,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(91,140,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: 0;
  }
  .orb {
    position: fixed; border-radius: 50%;
    filter: blur(80px); pointer-events: none; z-index: 0;
    animation: float 8s ease-in-out infinite;
  }
  .orb-1 { width:400px; height:400px; background:rgba(91,140,255,0.08); top:-100px; left:-100px; animation-delay:0s; }
  .orb-2 { width:350px; height:350px; background:rgba(0,229,190,0.06); bottom:-80px; right:-80px; animation-delay:3s; }
  .orb-3 { width:250px; height:250px; background:rgba(255,95,109,0.05); top:50%; right:20%; animation-delay:5s; }
  @keyframes float {
    0%,100% { transform:translate(0,0) scale(1); }
    33%      { transform:translate(20px,-20px) scale(1.05); }
    66%      { transform:translate(-15px,15px) scale(0.97); }
  }
  .floating-badges { position:fixed; inset:0; z-index:0; pointer-events:none; }
  .badge-float {
    position:absolute; background:var(--card); border:1px solid var(--border);
    border-radius:12px; padding:8px 14px; font-size:0.75rem; color:var(--muted);
    display:flex; align-items:center; gap:6px;
    animation:floatBadge 6s ease-in-out infinite; opacity:0.6;
  }
  .badge-float:nth-child(1) { top:15%; left:8%; animation-delay:0s; }
  .badge-float:nth-child(2) { top:25%; right:7%; animation-delay:1.5s; }
  .badge-float:nth-child(3) { bottom:25%; left:6%; animation-delay:3s; }
  .badge-float:nth-child(4) { bottom:15%; right:8%; animation-delay:4.5s; }
  .badge-float:nth-child(5) { top:55%; left:12%; animation-delay:2s; }
  @keyframes floatBadge {
    0%,100% { transform:translateY(0px); }
    50%      { transform:translateY(-10px); }
  }
  .auth-wrapper {
    position:relative; z-index:10;
    width:100%; max-width:440px; padding:1.5rem;
    animation:cardIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes cardIn {
    from { opacity:0; transform:translateY(30px) scale(0.95); }
    to   { opacity:1; transform:translateY(0) scale(1); }
  }
  .auth-card {
    background:rgba(19,24,40,0.85); backdrop-filter:blur(24px);
    border:1px solid var(--border); border-radius:24px; padding:2.2rem 2rem;
    box-shadow:0 40px 80px rgba(0,0,0,0.4), 0 0 0 1px rgba(91,140,255,0.05);
  }
  .auth-logo { text-align:center; margin-bottom:1.8rem; }
  .logo-icon {
    width:52px; height:52px;
    background:linear-gradient(135deg,var(--accent),var(--mint));
    border-radius:16px; display:inline-flex; align-items:center; justify-content:center;
    font-size:1.5rem; margin-bottom:0.7rem;
    box-shadow:0 8px 24px rgba(91,140,255,0.3);
  }
  .logo-name {
    font-family:var(--font-head); font-size:1.5rem; font-weight:800;
    background:linear-gradient(135deg,var(--accent),var(--mint));
    -webkit-background-clip:text;background-clip: text; -webkit-text-fill-color:transparent;
    letter-spacing:-0.5px; display:block;
  }
  .logo-tagline { font-size:0.78rem; color:var(--muted); margin-top:3px; display:block; }
  .tab-switcher {
    display:flex; background:var(--surface); border:1px solid var(--border);
    border-radius:12px; padding:4px; margin-bottom:1.8rem;
  }
  .tab-btn {
    flex:1; padding:8px; border:none; border-radius:9px;
    background:transparent; color:var(--muted);
    font-family:var(--font-head); font-size:0.82rem; font-weight:700;
    cursor:pointer; transition:all 0.25s;
  }
  .tab-btn.active {
    background:linear-gradient(135deg,var(--accent),#4070E0);
    color:#fff; box-shadow:0 4px 12px rgba(91,140,255,0.3);
  }
  .form-panel { display:none; }
  .form-panel.active { display:block; animation:fadeIn 0.3s ease; }
  @keyframes fadeIn {
    from { opacity:0; transform:translateY(8px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .form-group { margin-bottom:1rem; }
  .form-label {
    display:block; font-size:0.75rem; font-weight:500; color:var(--muted);
    margin-bottom:6px; letter-spacing:0.3px; text-transform:uppercase;
  }
  .form-input {
    width:100%; background:var(--surface); border:1px solid var(--border);
    border-radius:12px; padding:11px 14px; color:var(--text);
    font-family:var(--font-body); font-size:0.88rem; outline:none;
    transition:border-color 0.2s, box-shadow 0.2s;
  }
  .form-input::placeholder { color:var(--muted); }
  .form-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(91,140,255,0.12); }
  .input-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .input-wrap { position:relative; }
  .input-wrap .form-input { padding-right:40px; }
  .eye-btn {
    position:absolute; right:12px; top:50%; transform:translateY(-50%);
    background:none; border:none; color:var(--muted); cursor:pointer;
    font-size:0.9rem; padding:4px; transition:color 0.2s;
  }
  .eye-btn:hover { color:var(--accent); }
  .forgot-link { text-align:right; margin-top:-6px; margin-bottom:1rem; }
  .forgot-link a { font-size:0.75rem; color:var(--accent); text-decoration:none; }
  .btn-submit {
    width:100%; padding:13px;
    background:linear-gradient(135deg,var(--accent),#4070E0);
    border:none; border-radius:12px; color:#fff;
    font-family:var(--font-head); font-size:0.9rem; font-weight:700;
    cursor:pointer; transition:opacity 0.2s, transform 0.15s, box-shadow 0.2s;
    box-shadow:0 6px 20px rgba(91,140,255,0.3); letter-spacing:0.3px; margin-bottom:1rem;
  }
  .btn-submit:hover { opacity:0.92; transform:translateY(-1px); box-shadow:0 10px 28px rgba(91,140,255,0.4); }
  .btn-submit:active { transform:scale(0.98); }
  .btn-submit:disabled { opacity:0.6; cursor:not-allowed; transform:none; }
  .error-msg {
    background:rgba(255,95,109,0.1); border:1px solid rgba(255,95,109,0.3);
    border-radius:10px; padding:10px 14px; font-size:0.8rem; color:var(--warn);
    margin-bottom:1rem; display:none; animation:fadeIn 0.3s ease;
  }
  .success-msg {
    background:rgba(0,229,190,0.1); border:1px solid rgba(0,229,190,0.3);
    border-radius:10px; padding:10px 14px; font-size:0.8rem; color:var(--mint);
    margin-bottom:1rem; display:none; animation:fadeIn 0.3s ease;
  }
  .divider { display:flex; align-items:center; gap:10px; margin-bottom:1rem; }
  .divider::before, .divider::after { content:''; flex:1; height:1px; background:var(--border); }
  .divider span { font-size:0.72rem; color:var(--muted); }
  .strength-row { display:flex; gap:4px; margin-top:6px; }
  .strength-seg { flex:1; height:3px; border-radius:2px; background:var(--border); transition:background 0.3s; }
  .strength-label { font-size:0.68rem; color:var(--muted); margin-top:4px; text-align:right; }
  .terms-text { font-size:0.72rem; color:var(--muted); text-align:center; margin-top:1rem; line-height:1.5; }
  .terms-text a { color:var(--accent); text-decoration:none; }
  .stats-bar { display:flex; justify-content:center; gap:2rem; margin-top:1.5rem; padding-top:1.2rem; border-top:1px solid var(--border); }
  .stat-mini { text-align:center; }
  .stat-mini-val { font-family:var(--font-head); font-size:1rem; font-weight:800; color:var(--accent); }
  .stat-mini-label { font-size:0.65rem; color:var(--muted); margin-top:2px; }
  @media (max-width:480px) {
    .auth-card { padding:1.6rem 1.3rem; }
    .input-row { grid-template-columns:1fr; }
    .badge-float { display:none; }
  }
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="floating-badges">
  <div class="badge-float">🔥 Streak System</div>
  <div class="badge-float">✅ Smart Task Scoring</div>
  <div class="badge-float">⏱️ Pomodoro Timer</div>
  <div class="badge-float">🏆 Level System</div>
  <div class="badge-float">🤖 AI Daily Insights</div>
</div>

<div class="auth-wrapper">
  <div class="auth-card">

    <div class="auth-logo">
      <div class="logo-icon">⚡</div>
      <span class="logo-name">StudyFlow</span>
      <span class="logo-tagline">Your AI-powered study companion</span>
    </div>

    <div class="tab-switcher">
      <button class="tab-btn active" onclick="switchTab('login')">Login</button>
<button class="tab-btn" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- LOGIN -->
    <div class="form-panel active" id="loginPanel">
      <div class="error-msg" id="loginError"></div>
      <div class="success-msg" id="loginSuccess"></div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" id="loginEmail" placeholder="you@college.edu"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-wrap">
          <input type="password" class="form-input" id="loginPass" placeholder="Enter your password"/>
          <button class="eye-btn" onclick="togglePass('loginPass',this)">👁</button>
        </div>
      </div>
      <div class="forgot-link"><a href="#">Forgot password?</a></div>
      <button class="btn-submit" id="loginBtn" onclick="handleLogin()">Login to StudyFlow →</button>
      <div class="divider"><span>new here?</span></div>
      <div style="text-align:center; font-size:0.82rem; color:var(--muted)">
        Don't have an account? <a href="#" onclick="switchTab('signup')" style="color:var(--accent)">Sign up free</a>
      </div>
     
    <!-- SIGNUP -->
    <div class="form-panel" id="signupPanel">
      <div class="error-msg" id="signupError"></div>
      <div class="success-msg" id="signupSuccess"></div>
      <div class="input-row">
        <div class="form-group">
          <label class="form-label">First Name</label>
          <input type="text" class="form-input" id="signupFirst" placeholder="Arjun"/>
        </div>
        <div class="form-group">
          <label class="form-label">Last Name</label>
          <input type="text" class="form-input" id="signupLast" placeholder="Kumar"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">College Email</label>
        <input type="email" class="form-input" id="signupEmail" placeholder="you@college.edu"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-wrap">
          <input type="password" class="form-input" id="signupPass" placeholder="Create a strong password" oninput="checkStrength(this.value)"/>
          <button class="eye-btn" onclick="togglePass('signupPass',this)">👁</button>
        </div>
        <div class="strength-row">
          <div class="strength-seg" id="s1"></div>
          <div class="strength-seg" id="s2"></div>
          <div class="strength-seg" id="s3"></div>
          <div class="strength-seg" id="s4"></div>
        </div>
        <div class="strength-label" id="strengthLabel"></div>
      </div>
      <div class="form-group">
        <label class="form-label">I am a</label>
        <select class="form-input" id="signupYear">
          <option value="">Select your year</option>
          <option>FY Engineering</option>
          <option>SY Engineering</option>
          <option>TY Engineering</option>
          <option>Final Year Engineering</option>
          <option>Other</option>
        </select>
      </div>
      <button class="btn-submit" id="signupBtn" onclick="handleSignup()">Create My Account →</button>
      <div class="terms-text">
        By signing up you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
      </div>
    </div>

  </div>
</div>

<script>
function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b,i) => {
      b.classList.toggle('active', (tab==='login'&&i===0)||(tab==='signup'&&i===1));
    });
    document.getElementById('loginPanel').classList.toggle('active', tab==='login');
    document.getElementById('signupPanel').classList.toggle('active', tab==='signup');
  }

  function togglePass(id, btn) {
    const inp = document.getElementById(id);
    inp.type = inp.type === 'password' ? 'text' : 'password';
    btn.textContent = inp.type === 'password' ? '👁' : '🙈';
  }

  function checkStrength(val) {
    let score = 0;
    if (val.length >= 8) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;
    const colors = ['','#FF5F6D','#FFB830','#5B8CFF','#00E5BE'];
    const labels = ['','Weak','Fair','Good','Strong 💪'];
    for (let i=1;i<=4;i++) {
      document.getElementById('s'+i).style.background = i<=score ? colors[score] : 'var(--border)';
    }
    const lbl = document.getElementById('strengthLabel');
    lbl.textContent = val.length > 0 ? labels[score] : '';
    lbl.style.color  = colors[score];
  }

  function showError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg; el.style.display = 'block';
    setTimeout(() => { el.style.display = 'none'; }, 4000);
  }

  function showSuccess(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg; el.style.display = 'block';
  }

  async function handleLogin() {
    const email    = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPass').value.trim();
    if (!email || !password) return showError('loginError', 'Please fill in all fields');

    const btn = document.getElementById('loginBtn');
    btn.textContent = 'Logging in...'; btn.disabled = true;

    try {
      const res  = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (data.success) {
        showSuccess('loginSuccess', `Welcome back, ${data.name}! Redirecting...`);
        setTimeout(() => { window.location.href = '/dashboard'; }, 1000);
      } else {
        showError('loginError', data.message || 'Invalid credentials');
        btn.textContent = 'Login to StudyFlow →'; btn.disabled = false;
      }
    } catch(e) {
      showError('loginError', 'Server error. Is Flask running?');
      btn.textContent = 'Login to StudyFlow →'; btn.disabled = false;
    }
  }

  async function handleSignup() {
    const first    = document.getElementById('signupFirst').value.trim();
    const last     = document.getElementById('signupLast').value.trim();
    const email    = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPass').value.trim();
    const year     = document.getElementById('signupYear').value;

    if (!first || !email || !password) return showError('signupError', 'Please fill in all required fields');
    if (password.length < 6) return showError('signupError', 'Password must be at least 6 characters');

    const btn = document.getElementById('signupBtn');
    btn.textContent = 'Creating account...'; btn.disabled = true;

    try {
      const res  = await fetch('/api/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: `${first} ${last}`.trim(), email, password, year })
      });
      const data = await res.json();
      if (data.success) {
        showSuccess('signupSuccess', `Account created! Welcome, ${data.name}! Redirecting...`);
        setTimeout(() => { window.location.href = '/dashboard'; }, 1200);
      } else {
        showError('signupError', data.message || 'Signup failed');
        btn.textContent = 'Create My Account →'; btn.disabled = false;
      }
    } catch(e) {
      showError('signupError', 'Server error. Is Flask running?');
      btn.textContent = 'Create My Account →'; btn.disabled = false;
    }
  }

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      if (document.getElementById('loginPanel').classList.contains('active')) handleLogin();
      else handleSignup();
    }
  });
</script>
</body>
</html>
